name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Annule les runs précédents sur la même ref pour économiser des ressources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint (ESLint & Prettier)
        run: npm run lint

      - name: Run Typecheck (TSC)
        run: npm run typecheck
